<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japanese Knotweed Detection – U-Net Orthoimagery</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    #map { width: 100%; height: 100%; }

    /* Shared panel style for both IControls */
    .ctrl-panel {
      background: rgba(22, 33, 62, 0.95);
      border: 1px solid #0f3460;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #e0e0e0;
      backdrop-filter: blur(4px);
      min-width: 220px;
      max-width: 260px;
      overflow: hidden;
    }

    .ctrl-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid #0f3460;
    }
    .ctrl-panel-header:hover { background: rgba(255,255,255,0.04); }

    .ctrl-panel-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9e9e9e;
    }

    .ctrl-panel-chevron {
      font-size: 0.65rem;
      color: #9e9e9e;
      transition: transform 0.2s;
      line-height: 1;
    }
    .ctrl-panel.collapsed .ctrl-panel-chevron { transform: rotate(180deg); }
    .ctrl-panel.collapsed .ctrl-panel-body { display: none; }

    .ctrl-panel-body { padding: 12px 14px; }

    /* Layers control */
    .layer-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 8px;
    }
    .layer-row:last-child { margin-bottom: 0; }
    .layer-row label { font-size: 0.84rem; cursor: pointer; flex: 1; }

    .swatch {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .toggle {
      width: 34px;
      height: 18px;
      background: #444;
      border-radius: 9px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle.on { background: #4caf50; }
    .toggle::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }
    .toggle.on::after { left: 18px; }

    .opacity-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #0f3460;
    }
    .opacity-row label { font-size: 0.78rem; color: #9e9e9e; white-space: nowrap; }
    .opacity-row input[type=range] { flex: 1; min-width: 0; }

    /* Info control */
    .info-body { color: #bdbdbd; line-height: 1.55; }
    .info-body a { color: #64b5f6; }
    .info-body em { font-style: italic; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  // ── Collapsible panel helper ──────────────────────────────────────────────
  function makePanel(titleText, bodyHTML) {
    const el = document.createElement('div');
    el.className = 'ctrl-panel maplibregl-ctrl';

    const header = document.createElement('div');
    header.className = 'ctrl-panel-header';
    header.innerHTML = `<span class="ctrl-panel-title">${titleText}</span>
                        <span class="ctrl-panel-chevron">▲</span>`;
    header.addEventListener('click', () => el.classList.toggle('collapsed'));

    const body = document.createElement('div');
    body.className = 'ctrl-panel-body';
    body.innerHTML = bodyHTML;

    el.appendChild(header);
    el.appendChild(body);
    return el;
  }

  // ── Layers control ────────────────────────────────────────────────────────
  const layerDefs = [
    { toggleId: 'toggle-gt',  color: '#ff0000', label: 'Ground truth',      layer: 'ground-truth-fill' },
    { toggleId: 'toggle-126', color: '#ff9800', label: 'Prediction – 126',   layer: 'pred-126-fill' },
    { toggleId: 'toggle-127', color: '#ffeb3b', label: 'Prediction – 127',   layer: 'pred-127-fill' },
    { toggleId: 'toggle-93',  color: '#4caf50', label: 'Prediction – 93',    layer: 'pred-93-fill' },
  ];

  const layersBodyHTML = `
    <div class="opacity-row">
      <label for="aerialOpacity">Aerial opacity</label>
      <input type="range" id="aerialOpacity" min="0" max="1" step="0.05" value="1" />
    </div>
    ${layerDefs.map(({ toggleId, color, label, layer }) => `
      <div class="layer-row">
        <div class="swatch" style="background:${color}; opacity:0.75;"></div>
        <label>${label}</label>
        <div id="${toggleId}" class="toggle on" data-layer="${layer}"></div>
      </div>`).join('')}`;

  const LayersControl = {
    onAdd(map) {
      this._map = map;
      this._el = makePanel('Layers', layersBodyHTML);
      return this._el;
    },
    onRemove() { this._el.remove(); }
  };

  // ── Info control ──────────────────────────────────────────────────────────
  const infoBodyHTML = `
    <p class="info-body">
      U-Net segmentation of <em>Fallopia japonica</em> (Japanese knotweed) in
      ortho-rectified 7.5&nbsp;cm/px aerial imagery from the
      <a href="https://www.maine.gov/geolib/" target="_blank">Maine GeoLibrary</a>, 2021.
      Predictions from three model checkpoints are overlaid on the aerial image.
      <br/><br/>
      <a href="https://github.com/PhilipMathieu/unet-orthoimagery" target="_blank">Source on GitHub</a>
      &nbsp;|&nbsp;
      <a href="https://www.youtube.com/watch?v=7JHhMM3SsUo" target="_blank">Presentation</a>
    </p>`;

  const InfoControl = {
    onAdd(map) {
      this._map = map;
      this._el = makePanel('About', infoBodyHTML);
      return this._el;
    },
    onRemove() { this._el.remove(); }
  };

  // ── Map ───────────────────────────────────────────────────────────────────
  const map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        osm: {
          type: 'raster',
          tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
          tileSize: 256,
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }
      },
      layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
    },
    center: [-70.2188516, 43.5621436],
    zoom: 15,
    maxZoom: 20
  });

  map.addControl(new maplibregl.NavigationControl(), 'top-left');
  map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-left');
  map.addControl(LayersControl, 'top-right');
  map.addControl(InfoControl, 'bottom-right');

  // ── Data layers ───────────────────────────────────────────────────────────
  const aerialBounds = [
    [-70.2195925, 43.5635340],
    [-70.2181106, 43.5635340],
    [-70.2181106, 43.5607531],
    [-70.2195925, 43.5607531]
  ];

  map.on('load', () => {
    map.addSource('aerial', {
      type: 'image',
      url: 'aerial.jpg',
      coordinates: aerialBounds
    });
    map.addLayer({ id: 'aerial-layer', type: 'raster', source: 'aerial', paint: { 'raster-opacity': 1 } });

    const geojsonLayers = [
      { id: 'ground-truth', file: 'ground_truth.geojson', color: '#ff0000' },
      { id: 'pred-126',     file: 'prediction_126.geojson', color: '#ff9800' },
      { id: 'pred-127',     file: 'prediction_127.geojson', color: '#ffeb3b' },
      { id: 'pred-93',      file: 'prediction_93.geojson',  color: '#4caf50' }
    ];

    geojsonLayers.forEach(({ id, file, color }) => {
      map.addSource(id, { type: 'geojson', data: file });
      map.addLayer({ id: `${id}-fill`,    type: 'fill', source: id,
                     paint: { 'fill-color': color, 'fill-opacity': 0.45 } });
      map.addLayer({ id: `${id}-outline`, type: 'line', source: id,
                     paint: { 'line-color': color, 'line-width': 1, 'line-opacity': 0.8 } });
    });

    // Wire up controls (DOM is ready after addControl, data layers are now loaded)
    document.getElementById('aerialOpacity').addEventListener('input', e => {
      map.setPaintProperty('aerial-layer', 'raster-opacity', parseFloat(e.target.value));
    });

    document.querySelectorAll('.toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const fillId    = btn.dataset.layer;
        const outlineId = fillId.replace('-fill', '-outline');
        const isOn = btn.classList.toggle('on');
        const vis  = isOn ? 'visible' : 'none';
        if (map.getLayer(fillId))    map.setLayoutProperty(fillId,    'visibility', vis);
        if (map.getLayer(outlineId)) map.setLayoutProperty(outlineId, 'visibility', vis);
      });
    });
  });
</script>

</body>
</html>
